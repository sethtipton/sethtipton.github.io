<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root {
      --project-background: #f7f1e8;
      --project-surface: #fffdf8;
      --project-border: #d8ccc0;
      --project-panel: #f0e7d9;
      --project-accent: #0f766e;
      --project-text: #1f2933;
      --project-muted: #52606d;
    }
  </style>
  <rect width="1200" height="720" rx="36" fill="var(--project-background)"/>
  <rect x="72" y="88" width="1056" height="544" rx="30" fill="var(--project-surface)" stroke="var(--project-border)"/>
  <rect x="112" y="128" width="280" height="464" rx="24" fill="var(--project-panel)"/>
  <rect x="436" y="128" width="652" height="76" rx="20" fill="var(--project-accent)"/>
  <rect x="436" y="238" width="304" height="140" rx="22" fill="var(--project-background)" stroke="var(--project-border)"/>
  <rect x="784" y="238" width="304" height="140" rx="22" fill="var(--project-background)" stroke="var(--project-border)"/>
  <rect x="436" y="412" width="652" height="180" rx="24" fill="var(--project-panel)"/>
  <text x="112" y="542" fill="var(--project-text)" font-family="Avenir Next, Segoe UI, sans-serif" font-size="34" font-weight="700">Tree City Rentals</text>
  <text x="112" y="582" fill="var(--project-muted)" font-family="Avenir Next, Segoe UI, sans-serif" font-size="24">Headless WordPress content feeding a React frontend.</text>
</svg>
